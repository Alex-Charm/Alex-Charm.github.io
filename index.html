<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kart Racer 3D</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#0a0a0a;--fg:#fff;--accent:#FF6B00;--accent2:#FFD600;--card:rgba(0,0,0,.72);--muted:#aaa}
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:var(--bg);font-family:'Space Grotesk',sans-serif;color:var(--fg)}
canvas{display:block}
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.8rem;z-index:100;transition:opacity .4s}
.overlay.hidden{display:none}
#startScreen{background:linear-gradient(145deg,rgba(0,0,0,.88),rgba(30,12,0,.92))}
.game-title{font-family:'Russo One',sans-serif;font-size:clamp(2.5rem,7vw,5rem);background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 40px rgba(255,107,0,.35));line-height:1.1}
.start-btn{font-family:'Russo One',sans-serif;font-size:1.2rem;padding:1rem 3rem;background:linear-gradient(135deg,var(--accent),#FF8C00);color:#fff;border:none;border-radius:50px;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 24px rgba(255,107,0,.4)}
.start-btn:hover{transform:scale(1.06);box-shadow:0 6px 36px rgba(255,107,0,.6)}
.controls-info{display:flex;gap:1.2rem;flex-wrap:wrap;justify-content:center}
.control-item{display:flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--muted)}
.key-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:5px;padding:.15rem .55rem;font-family:'Russo One',sans-serif;font-size:.75rem;color:var(--fg)}
#hud{position:fixed;inset:0;pointer-events:none;z-index:50}
#hud.hidden{display:none}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start;padding:1.2rem 1.5rem}
.hud-panel{background:var(--card);backdrop-filter:blur(12px);border-radius:10px;padding:.6rem 1.1rem;border:1px solid rgba(255,255,255,.08)}
.hud-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.hud-value{font-family:'Russo One',sans-serif;font-size:1.7rem;line-height:1.1}
.speed-display{text-align:center}
.speed-number{font-family:'Russo One',sans-serif;font-size:2.6rem;color:var(--accent);line-height:1}
.speed-unit{font-size:.7rem;color:var(--muted)}
.lap-value{font-family:'Russo One',sans-serif;font-size:1.4rem}
.lap-total{font-size:.75rem;color:var(--muted)}
.item-display{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:.7rem}
.item-box-hud{width:56px;height:56px;background:var(--card);border:2px solid rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.item-hint{font-size:.7rem;color:var(--muted);background:var(--card);padding:.25rem .65rem;border-radius:5px}
#minimap{position:fixed;bottom:1.2rem;right:1.2rem;width:140px;height:140px;background:rgba(0,0,0,.55);border-radius:10px;border:1px solid rgba(255,255,255,.08)}
#countdown{font-family:'Russo One',sans-serif;font-size:clamp(4rem,15vw,9rem);color:#fff;text-shadow:0 0 50px rgba(255,107,0,.7);animation:cpulse .45s ease-out}
@keyframes cpulse{0%{transform:scale(2.2);opacity:0}60%{transform:scale(1.05);opacity:1}100%{transform:scale(1);opacity:1}}
#lapNotification{position:fixed;top:38%;left:50%;transform:translateX(-50%) translateY(-15px);opacity:0;transition:all .5s;font-family:'Russo One',sans-serif;font-size:clamp(1.5rem,4vw,2.2rem);color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.6);pointer-events:none;z-index:60;white-space:nowrap}
#resultsScreen{background:linear-gradient(145deg,rgba(0,0,0,.92),rgba(30,12,0,.95))}
.result-position{font-family:'Russo One',sans-serif;font-size:clamp(3rem,12vw,7rem);color:var(--accent2);line-height:1}
.result-time{font-family:'Russo One',sans-serif;font-size:clamp(1.2rem,3vw,2rem);color:var(--fg)}
.wrong-way{position:fixed;top:25%;left:50%;transform:translateX(-50%);font-family:'Russo One',sans-serif;font-size:2rem;color:#ff3333;text-shadow:0 0 20px rgba(255,0,0,.5);pointer-events:none;z-index:55;opacity:0;transition:opacity .3s}
.vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.45) 100%);pointer-events:none;z-index:45}
#speedLines{position:fixed;inset:0;pointer-events:none;z-index:44}
</style>
</head>
<body>
<div id="startScreen" class="overlay">
  <div class="game-title">KART RACER</div>
  <p style="color:var(--muted);font-size:1rem;max-width:380px;text-align:center;line-height:1.6">Race 3 opponents across a winding 3-lap circuit. Grab item boxes for boosts, shells, and bananas.</p>
  <div class="controls-info">
    <div class="control-item"><span class="key-badge">W</span><span class="key-badge">↑</span> Gas</div>
    <div class="control-item"><span class="key-badge">S</span><span class="key-badge">↓</span> Brake</div>
    <div class="control-item"><span class="key-badge">A D</span><span class="key-badge">← →</span> Steer</div>
    <div class="control-item"><span class="key-badge">SPACE</span> Use Item</div>
  </div>
  <button class="start-btn" id="startBtn">START RACE</button>
</div>
<div id="countdownOverlay" class="overlay hidden"><div id="countdown"></div></div>
<div id="hud" class="hidden">
  <div class="hud-top">
    <div class="hud-panel"><div class="hud-label">Position</div><div class="hud-value" id="posDisp">4th</div></div>
    <div class="hud-panel" style="text-align:center"><div class="hud-label">Lap</div><div><span class="lap-value" id="lapDisp">1</span><span class="lap-total"> / 3</span></div></div>
    <div class="hud-panel speed-display"><div class="speed-number" id="spdDisp">0</div><div class="speed-unit">KM/H</div></div>
  </div>
  <div class="item-display" id="itemDisp" style="display:none"><div class="item-box-hud" id="itemIcon"></div><div class="item-hint">SPACE to use</div></div>
  <canvas id="minimap" width="140" height="140"></canvas>
  <div id="lapNotification"></div>
  <div class="wrong-way" id="wrongWay">WRONG WAY</div>
</div>
<div id="resultsScreen" class="overlay hidden">
  <div class="result-position" id="resPos">1st</div>
  <div class="result-time" id="resTime">0:00.00</div>
  <button class="start-btn" id="restartBtn">RACE AGAIN</button>
</div>
<div class="vignette"></div>
<canvas id="speedLines"></canvas>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';

/* ─── Config ─── */
const ROAD_W=16,SAMPLES=1000,MAX_SPD=78,ACCEL=42,BRAKE=65;
const FRIC=.982,TURN_SPD=2.3,LAPS=3,AI_N=3,BOX_N=8,BOX_RESPAWN=6;
const KART_COLS=[0xE53935,0x1E88E5,0xFDD835,0x43A047];
const ORD=['st','nd','rd','th'];

/* ─── Track Curve ─── */
const cp=[[0,0,0],[70,0,5],[125,0,-15],[155,2,-65],[145,6,-120],[110,9,-150],[55,8,-145],[10,5,-110],[-25,2,-65],[-40,0,-25]].map(p=>new THREE.Vector3(...p));
const curve=new THREE.CatmullRomCurve3(cp,true,'catmullrom',.5);
const tLen=curve.getLength();
const tPts=[],tTan=[],tRt=[],tUp=[];
const _up=new THREE.Vector3(0,1,0);
for(let i=0;i<SAMPLES;i++){
  const t=i/SAMPLES,p=curve.getPointAt(t),tn=curve.getTangentAt(t).normalize();
  let r=new THREE.Vector3().crossVectors(tn,_up).normalize();
  if(r.lengthSq()<.001)r.set(1,0,0);
  tPts.push(p);tTan.push(tn);tRt.push(r);tUp.push(new THREE.Vector3().crossVectors(r,tn).normalize());
}
function trackAt(t){const i=Math.floor(((t%1)+1)%1*SAMPLES)%SAMPLES;return{p:tPts[i],tn:tTan[i],r:tRt[i],i};}
function closestIdx(pos){let md=1e18,mi=0;for(let i=0;i<SAMPLES;i++){const dx=pos.x-tPts[i].x,dz=pos.z-tPts[i].z,d=dx*dx+dz*dz;if(d<md){md=d;mi=i;}}return{i:mi,t:mi/SAMPLES,d:Math.sqrt(md)};}
function sRng(s){s=Math.sin(s)*43758.5453;return s-Math.floor(s);}

/* ─── Renderer ─── */
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.prepend(renderer.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.5,800);
camera.position.set(60,80,-200);camera.lookAt(40,0,-70);

/* ─── Sky Dome ─── */
const skyCvs=document.createElement('canvas');skyCvs.width=512;skyCvs.height=512;
const skx=skyCvs.getContext('2d');
const skyG=skx.createLinearGradient(0,0,0,512);
skyG.addColorStop(0,'#0d2137');skyG.addColorStop(.25,'#1a4a6e');skyG.addColorStop(.45,'#4a90b8');
skyG.addColorStop(.62,'#87ceeb');skyG.addColorStop(.78,'#f5d5a0');skyG.addColorStop(.9,'#e8a060');skyG.addColorStop(1,'#d08050');
skx.fillStyle=skyG;skx.fillRect(0,0,512,512);
// Clouds on sky texture
for(let i=0;i<40;i++){const cx=Math.random()*512,cy=120+Math.random()*180,rx=30+Math.random()*80,ry=8+Math.random()*20;
skx.fillStyle=`rgba(255,255,255,${.03+Math.random()*.06})`;skx.beginPath();skx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);skx.fill();}
const skyTex=new THREE.CanvasTexture(skyCvs);
const sky=new THREE.Mesh(new THREE.SphereGeometry(380,32,24),new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide,fog:false}));
scene.add(sky);

/* ─── Sun Disc + Glow ─── */
const sunGroup=new THREE.Group();
sunGroup.position.set(120,95,60);
const sunDisc=new THREE.Mesh(new THREE.SphereGeometry(12,16,16),new THREE.MeshBasicMaterial({color:0xfff8e0,fog:false}));
sunGroup.add(sunDisc);
const glowCvs=document.createElement('canvas');glowCvs.width=glowCvs.height=128;
const glx=glowCvs.getContext('2d');
const glG=glx.createRadialGradient(64,64,0,64,64,64);
glG.addColorStop(0,'rgba(255,240,200,1)');glG.addColorStop(.15,'rgba(255,220,150,.6)');
glG.addColorStop(.4,'rgba(255,180,80,.15)');glG.addColorStop(1,'rgba(255,150,50,0)');
glx.fillStyle=glG;glx.fillRect(0,0,128,128);
const glowTex=new THREE.CanvasTexture(glowCvs);
const glowSprite=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,blending:THREE.AdditiveBlending,transparent:true,opacity:.7,fog:false}));
glowSprite.scale.set(120,120,1);sunGroup.add(glowSprite);
scene.add(sunGroup);

/* ─── Environment Map ─── */
const envCvs=document.createElement('canvas');envCvs.width=256;envCvs.height=128;
const ectx=envCvs.getContext('2d');
const eG=ectx.createLinearGradient(0,0,0,128);
eG.addColorStop(0,'#0d2137');eG.addColorStop(.4,'#4a90b8');eG.addColorStop(.6,'#87ceeb');
eG.addColorStop(.8,'#f5d5a0');eG.addColorStop(1,'#d08050');
ectx.fillStyle=eG;ectx.fillRect(0,0,256,128);
ectx.fillStyle='#fff8e0';ectx.beginPath();ectx.arc(190,45,12,0,Math.PI*2);ectx.fill();
const envTex=new THREE.CanvasTexture(envCvs);envTex.mapping=THREE.EquirectangularReflectionMapping;
const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromEquirectangular(envTex).texture;pmrem.dispose();

/* ─── Lighting ─── */
scene.add(new THREE.AmbientLight(0x8090a8,.45));
const sun=new THREE.DirectionalLight(0xfff0d0,1.6);
sun.position.set(120,95,60);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
const sc=sun.shadow.camera;sc.near=1;sc.far=500;sc.left=-200;sc.right=200;sc.top=200;sc.bottom=-200;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87CEEB,0x4a7a3a,.3));
const fillLight=new THREE.DirectionalLight(0x8090c0,.3);fillLight.position.set(-80,40,-60);scene.add(fillLight);

/* ─── Fog ─── */
scene.fog=new THREE.FogExp2(0x90b8d0,.0014);

/* ─── Ground ─── */
const gCvs=document.createElement('canvas');gCvs.width=gCvs.height=512;
const gx=gCvs.getContext('2d');
const gG=gx.createRadialGradient(256,256,0,256,256,360);
gG.addColorStop(0,'#5cb85c');gG.addColorStop(.5,'#4caf50');gG.addColorStop(1,'#3d8b37');
gx.fillStyle=gG;gx.fillRect(0,0,512,512);
for(let i=0;i<8000;i++){const shade=40+Math.random()*60;
gx.fillStyle=`rgb(${shade},${80+Math.random()*80},${shade-10})`;gx.fillRect(Math.random()*512,Math.random()*512,1+Math.random()*2,1+Math.random()*2);}
const gTex=new THREE.CanvasTexture(gCvs);gTex.wrapS=gTex.wrapT=THREE.RepeatWrapping;gTex.repeat.set(22,22);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(700,700),new THREE.MeshStandardMaterial({map:gTex,roughness:.9,metalness:0}));
ground.rotation.x=-Math.PI/2;ground.position.y=-.1;ground.receiveShadow=true;scene.add(ground);

/* ─── Road Mesh ─── */
function buildRoad(){
  const hw=ROAD_W/2,pos=[],uvs=[],idx=[];
  for(let i=0;i<=SAMPLES;i++){
    const j=i%SAMPLES,p=tPts[j],r=tRt[j];
    pos.push(p.x-r.x*hw,p.y+.05,p.z-r.z*hw, p.x+r.x*hw,p.y+.05,p.z+r.z*hw);
    uvs.push(0,i*.15, 1,i*.15);
    if(i<SAMPLES){const b=i*2;idx.push(b,b+2,b+1,b+1,b+2,b+3);}
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));g.setIndex(idx);g.computeVertexNormals();
  // Asphalt texture
  const rCvs=document.createElement('canvas');rCvs.width=256;rCvs.height=256;
  const rx=rCvs.getContext('2d');rx.fillStyle='#3a3a3a';rx.fillRect(0,0,256,256);
  for(let i=0;i<6000;i++){const v=35+Math.random()*35;rx.fillStyle=`rgb(${v},${v},${v})`;rx.fillRect(Math.random()*256,Math.random()*256,1+Math.random()*2,1+Math.random()*2);}
  const rTex=new THREE.CanvasTexture(rCvs);rTex.wrapS=rTex.wrapT=THREE.RepeatWrapping;rTex.repeat.set(2,30);
  return new THREE.Mesh(g,new THREE.MeshStandardMaterial({map:rTex,roughness:.75,metalness:.05}));
}
scene.add(buildRoad());

/* ─── Curbs ─── */
function buildCurb(side){
  const cw=1.4,hw=ROAD_W/2,s=side==='l'?-1:1,pos=[],cols=[],idx=[];
  for(let i=0;i<=SAMPLES;i++){
    const j=i%SAMPLES,p=tPts[j],r=tRt[j];
    pos.push(p.x+r.x*s*hw,p.y+.1,p.z+r.z*s*hw, p.x+r.x*s*(hw+cw),p.y+.1,p.z+r.z*s*(hw+cw));
    const red=Math.floor(i/6)%2===0;const c=red?new THREE.Color(0xee2222):new THREE.Color(0xffffff);
    cols.push(c.r,c.g,c.b,c.r,c.g,c.b);
    if(i<SAMPLES){const b=i*2;idx.push(b,b+2,b+1,b+1,b+2,b+3);}
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));g.setIndex(idx);g.computeVertexNormals();
  return new THREE.Mesh(g,new THREE.MeshPhongMaterial({vertexColors:true}));
}
scene.add(buildCurb('l'));scene.add(buildCurb('r'));

/* ─── Road Markings (center dashes + edge lines) ─── */
function buildMarking(latOff,dashLen,gapLen,color,w){
  const pos=[],idx=[],whiteMat=new THREE.MeshBasicMaterial({color});
  let accLen=0,drawing=true;
  for(let i=0;i<=SAMPLES;i++){
    const j=i%SAMPLES,p=tPts[j],r=tRt[j];
    const segLen=tLen/SAMPLES;accLen+=segLen;
    if(dashLen>0){if(drawing&&accLen>dashLen){drawing=false;accLen=0;}else if(!drawing&&accLen>gapLen){drawing=true;accLen=0;}}
    if(dashLen<=0||drawing){
      const nx=p.x+r.x*latOff,nz=p.z+r.z*latOff;
      pos.push(nx-w/2,p.y+.12,nz-w/2, nx+w/2,p.y+.12,nz+w/2);
      if(i>0&&(dashLen<=0||drawing)){const b=(i-1)*2;idx.push(b,b+2,b+1,b+1,b+2,b+3);}
    }else{pos.push(0,-100,0,0,-100,0);}
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));g.setIndex(idx);g.computeVertexNormals();
  return new THREE.Mesh(g,whiteMat);
}
scene.add(buildMarking(0,2,3,0xffffff,.35)); // center dashes
scene.add(buildMarking(-ROAD_W/2+.8,0,0,0xffffff,.25)); // left edge
scene.add(buildMarking(ROAD_W/2-.8,0,0,0xffffff,.25)); // right edge

/* ─── Start/Finish Line ─── */
const sfCvs=document.createElement('canvas');sfCvs.width=128;sfCvs.height=16;
const sfx=sfCvs.getContext('2d');
for(let y=0;y<16;y+=4)for(let i=0;i<128;i+=4){sfx.fillStyle=((i/4+y/4)%2===0)?'#fff':'#111';sfx.fillRect(i,y,4,4);}
const sfPlane=new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W,3),new THREE.MeshPhongMaterial({map:new THREE.CanvasTexture(sfCvs)}));
sfPlane.rotation.x=-Math.PI/2;
const sfGrp=new THREE.Group();sfGrp.add(sfPlane);
const sd=trackAt(0);sfGrp.position.set(sd.p.x,sd.p.y+.13,sd.p.z);sfGrp.rotation.y=Math.atan2(sd.tn.x,sd.tn.z);
scene.add(sfGrp);

/* ─── Start Arch ─── */
(function(){
  const g=new THREE.Group(),wm=new THREE.MeshStandardMaterial({color:0xeeeeee,roughness:.4,metalness:.3});
  [-1,1].forEach(s=>{
    const p=new THREE.Mesh(new THREE.CylinderGeometry(.6,.7,12,8),wm);p.position.set(s*(ROAD_W/2+1.5),6,0);p.castShadow=true;g.add(p);
    const base=new THREE.Mesh(new THREE.BoxGeometry(2.5,1,2.5),new THREE.MeshStandardMaterial({color:0xcccccc,roughness:.5,metalness:.2}));
    base.position.set(s*(ROAD_W/2+1.5),.5,0);g.add(base);
  });
  const bCvs=document.createElement('canvas');bCvs.width=256;bCvs.height=64;
  const bx=bCvs.getContext('2d');bx.fillStyle='#FF6B00';bx.fillRect(0,0,256,64);
  bx.strokeStyle='#fff';bx.lineWidth=3;bx.strokeRect(4,4,248,56);
  bx.fillStyle='#fff';bx.font='bold 38px Russo One,sans-serif';bx.textAlign='center';bx.textBaseline='middle';bx.fillText('START',128,34);
  const beam=new THREE.Mesh(new THREE.BoxGeometry(ROAD_W+4.5,2.5,2),new THREE.MeshStandardMaterial({map:new THREE.CanvasTexture(bCvs),roughness:.4,metalness:.2}));
  beam.position.set(0,12.5,0);g.add(beam);
  const d=trackAt(0);g.position.set(d.p.x,d.p.y,d.p.z);g.rotation.y=Math.atan2(d.tn.x,d.tn.z);
  scene.add(g);
})();

/* ─── Water Lake ─── */
const waterCvs=document.createElement('canvas');waterCvs.width=128;waterCvs.height=128;
const wtx=waterCvs.getContext('2d');
const wG=wtx.createLinearGradient(0,0,128,128);
wG.addColorStop(0,'#1a8aaa');wG.addColorStop(.5,'#2088bb');wG.addColorStop(1,'#1a7a9a');
wtx.fillStyle=wG;wtx.fillRect(0,0,128,128);
for(let i=0;i<200;i++){wtx.fillStyle=`rgba(150,220,255,${.02+Math.random()*.04})`;wtx.fillRect(Math.random()*128,Math.random()*128,2+Math.random()*8,1);}
const waterTex=new THREE.CanvasTexture(waterCvs);waterTex.wrapS=waterTex.wrapT=THREE.RepeatWrapping;waterTex.repeat.set(4,4);
const water=new THREE.Mesh(new THREE.CircleGeometry(22,32),new THREE.MeshPhongMaterial({map:waterTex,color:0x30aacc,transparent:true,opacity:.65,shininess:250,specular:0xaaddff}));
water.rotation.x=-Math.PI/2;water.position.set(42,-.15,-72);scene.add(water);

/* ─── Background Hills ─── */
for(let i=0;i<10;i++){
  const ang=(i/10)*Math.PI*2,r=200+sRng(i*7.1+300)*120;

function mkRound(x,z,s=1){

function mkPalm(x,z,s=1){
  const g=new THREE.Group();
  const tk=new THREE.Mesh(new THREE.CylinderGeometry(.15*s,.3*s,6*s,7),new THREE.MeshPhongMaterial({color:0xA1887F}));
  tk.position.y=3*s;tk.rotation.z=sRng(x*z)*.15;tk.castShadow=true;g.add(tk);

/* ─── Particle System ─── */
const MAX_P=400;
const pPositions=new Float32Array(MAX_P*3);
const pColors=new Float32Array(MAX_P*3);
const pGeo=new THREE.BufferGeometry();
pGeo.setAttribute('position',new THREE.BufferAttribute(pPositions,3));
pGeo.setAttribute('color',new THREE.BufferAttribute(pColors,3));
// Init off-screen
for(let i=0;i<MAX_P;i++){pPositions[i*3+1]=-500;}
const ptCvs=document.createElement('canvas');ptCvs.width=ptCvs.height=32;
const pctx=ptCvs.getContext('2d');
const pGr=pctx.createRadialGradient(16,16,0,16,16,16);
pGr.addColorStop(0,'rgba(255,255,255,1)');pGr.addColorStop(.4,'rgba(255,255,255,.6)');pGr.addColorStop(1,'rgba(255,255,255,0)');
pctx.fillStyle=pGr;pctx.fillRect(0,0,32,32);
const ptTex=new THREE.CanvasTexture(ptCvs);
const pMat=new THREE.PointsMaterial({size:1.8,map:ptTex,vertexColors:true,transparent:true,opacity:.85,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true});
const particlesMesh=new THREE.Points(pGeo,pMat);scene.add(particlesMesh);
const pData=Array.from({length:MAX_P},()=>({vx:0,vy:0,vz:0,life:0,maxLife:1,active:false,grav:true}));
function emitP(x,y,z,vx,vy,vz,r,g,b,life,grav=true){
  for(let i=0;i<MAX_P;i++){
    if(!pData[i].active){
      const p=pData[i];p.active=true;p.life=life;p.maxLife=life;p.grav=grav;
      p.vx=vx;p.vy=vy;p.vz=vz;
      const j=i*3;pPositions[j]=x;pPositions[j+1]=y;pPositions[j+2]=z;
      pColors[j]=r;pColors[j+1]=g;pColors[j+2]=b;return;
    }
  }
}
function emitDust(pos,heading){
  for(let i=0;i<3;i++)emitP(pos.x+(Math.random()-.5)*.8,pos.y+.2,pos.z+(Math.random()-.5)*.8,
    -Math.sin(heading)*2+(Math.random()-.5)*2, 1+Math.random()*2, -Math.cos(heading)*2+(Math.random()-.5)*2,
    .7,.55,.35, .8+Math.random()*.6);
}
function emitBoost(pos,heading){
  for(let i=0;i<6;i++)emitP(pos.x+(Math.random()-.5)*.5,pos.y+.4,pos.z+(Math.random()-.5)*.5,
    -Math.sin(heading)*(15+Math.random()*10)+(Math.random()-.5)*4, Math.random()*3, -Math.cos(heading)*(15+Math.random()*10)+(Math.random()-.5)*4,
    1,.4+Math.random()*.3,0, .3+Math.random()*.3, false);
}
function emitSparkle(pos){
  for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,sp=3+Math.random()*5;
    emitP(pos.x,pos.y+1,pos.z, Math.cos(a)*sp, 2+Math.random()*4, Math.sin(a)*sp, 1,.9,.3, .5+Math.random()*.4, true);}
}
function updateParticles(dt){
  for(let i=0;i<MAX_P;i++){
    const p=pData[i];
    if(!p.active){pPositions[i*3+1]=-500;continue;}
    p.life-=dt;
    if(p.life<=0){p.active=false;pPositions[i*3+1]=-500;continue;}
    const j=i*3;
    pPositions[j]+=p.vx*dt;pPositions[j+1]+=p.vy*dt;pPositions[j+2]+=p.vz*dt;
    if(p.grav)p.vy-=6*dt;
    const t=p.life/p.maxLife;
    pColors[j]*=(.97+t*.03);pColors[j+1]*=(.97+t*.03);pColors[j+2]*=(.97+t*.03);
  }
  pGeo.attributes.position.needsUpdate=true;
  pGeo.attributes.color.needsUpdate=true;
}

    const r=new THREE.Mesh(new THREE.CylinderGeometry(.2,.2,.3,8),rim);r.rotation.z=Math.PI/2;r.position.set(...p);g.add(r);
  });

/* ─── Projectiles ─── */
const projectiles=[];
const ITEMS=['boost','shell','banana'];
function rndItem(){const r=Math.random();return r<.4?'boost':r<.75?'shell':'banana';}
function showItemHUD(it){
  const d=document.getElementById('itemDisp'),ic=document.getElementById('itemIcon');
  d.style.display='flex';
  ic.innerHTML=it==='boost'?'<i class="fas fa-bolt" style="color:#FF6B00"></i>':it==='shell'?'<i class="fas fa-circle" style="color:#00CC00"></i>':'<i class="fas fa-exclamation-triangle" style="color:#FFDD00"></i>';
}
function checkBox(k,isP){
  for(const bx of itemBoxes){
    if(!bx.userData.active||k.item)continue;
    if(k.pos.distanceTo(bx.position)<2.5){
      bx.userData.active=false;bx.userData.timer=BOX_RESPAWN;bx.visible=false;if(bx.userData.glow)bx.userData.glow.visible=false;
      k.item=rndItem();if(isP)showItemHUD(k.item);emitSparkle(bx.position);
    }
  }
}
function useItem(k,isP){
  const it=k.item;k.item=null;k.itemTimer=null;
  if(isP)document.getElementById('itemDisp').style.display='none';
  if(it==='boost'){k.boostT=2.2;}
  else if(it==='shell'){
    const sh=new THREE.Mesh(new THREE.SphereGeometry(.4,10,10),new THREE.MeshStandardMaterial({color:0x00CC00,emissive:0x004400,roughness:.3,metalness:.4}));
    sh.position.copy(k.pos);sh.position.y+=.5;scene.add(sh);
    projectiles.push({mesh:sh,vel:new THREE.Vector3(Math.sin(k.heading)*110,0,Math.cos(k.heading)*110),bounces:0,owner:k,life:5});
  }else if(it==='banana'){
    const bn=new THREE.Mesh(new THREE.SphereGeometry(.4,8,5),new THREE.MeshPhongMaterial({color:0xFFDD00,emissive:0x443300,emissiveIntensity:.2}));
    bn.position.copy(k.pos);bn.position.y+=.3;bn.scale.set(1,.55,1);scene.add(bn);
    projectiles.push({mesh:bn,vel:new THREE.Vector3(),bounces:-1,owner:k,life:30,banana:true});
  }
}
function updateProj(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];p.life-=dt;
    if(p.life<=0){scene.remove(p.mesh);projectiles.splice(i,1);continue;}
    if(!p.banana){
      p.mesh.position.x+=p.vel.x*dt;p.mesh.position.z+=p.vel.z*dt;
      // Shell trail particles
      if(Math.random()<.5)emitP(p.mesh.position.x,p.mesh.position.y,p.mesh.position.z,(Math.random()-.5)*2,Math.random()*2,(Math.random()-.5)*2,0,.8,0,.3,false);
      const cl=closestIdx(p.mesh.position);
      if(cl.d>ROAD_W/2-1){
        if(p.bounces>=1){scene.remove(p.mesh);projectiles.splice(i,1);continue;}
        const tp=tPts[cl.i],dx=p.mesh.position.x-tp.x,dz=p.mesh.position.z-tp.z,nx=dx/cl.d,nz=dz/cl.d,dot=p.vel.x*nx+p.vel.z*nz;
        p.vel.x-=2*dot*nx;p.vel.z-=2*dot*nz;p.bounces++;
        for(let j=0;j<6;j++)emitP(p.mesh.position.x,p.mesh.position.y,p.mesh.position.z,(Math.random()-.5)*6,Math.random()*4,(Math.random()-.5)*6,1,.8,.3,.4);
      }
      p.mesh.rotation.x+=dt*12;p.mesh.rotation.z+=dt*8;
    }
    for(const k of allKarts){
      if(k===p.owner&&p.life>4.5)continue;
      if(k.pos.distanceTo(p.mesh.position)<2.2&&k.spinT<=0&&!k.finished){
        k.spinT=1.5;k.speed=0;
        for(let j=0;j<12;j++)emitP(k.pos.x,k.pos.y+1,k.pos.z,(Math.random()-.5)*8,2+Math.random()*5,(Math.random()-.5)*8,1,.3,.1,.6);
        scene.remove(p.mesh);projectiles.splice(i,1);break;
      }
    }
  }
}

/* ─── Position Karts ─── */
function posKarts(){
  const sp=[{dt:0,lat:-3},{dt:-.003,lat:3},{dt:-.006,lat:-3},{dt:-.009,lat:3}];
  allKarts.forEach((k,i)=>{
    const t=((.998+sp[i].dt)%1+1)%1,d=trackAt(t);
    k.pos.set(d.p.x+d.r.x*sp[i].lat,d.p.y,d.p.z+d.r.z*sp[i].lat);
    k.heading=Math.atan2(d.tn.x,d.tn.z);
    k.mesh.position.copy(k.pos);k.mesh.rotation.y=k.heading;
    k.curT=t;k.prevT=t;k.lap=0;k.speed=0;
    k.item=null;k.spinT=0;k.boostT=0;k.finished=false;k.finTime=0;k.hasPassed=false;
    k.itemTimer=null;k.mesh.userData.flame.visible=false;k.mesh.userData.flame2.visible=false;
  });
}

/* ─── Player Update ─── */
let dustTimer=0;
function updatePlayer(dt){
  if(player.finished){player.speed*=.97;player.mesh.position.copy(player.pos);return;}
  if(player.spinT>0){
    player.spinT-=dt;player.mesh.rotation.y+=dt*16;player.speed*=.94;
    player.mesh.position.copy(player.pos);
    if(Math.random()<.3)emitP(player.pos.x,player.pos.y+.5,player.pos.z,(Math.random()-.5)*4,Math.random()*3,(Math.random()-.5)*4,.5,.3,.1,.5);
    return;
  }
  const acc=keys.KeyW||keys.ArrowUp,brk=keys.KeyS||keys.ArrowDown;
  const lft=keys.KeyA||keys.ArrowLeft,rgt=keys.KeyD||keys.ArrowRight;
  const mxSpd=player.boostT>0?MAX_SPD*1.5:MAX_SPD;
  if(acc)player.speed+=ACCEL*dt;
  if(brk)player.speed-=BRAKE*dt;
  player.speed*=FRIC;
  player.speed=Math.max(-15,Math.min(mxSpd,player.speed));
  const tf=Math.min(1,Math.abs(player.speed)/12);
  if(lft)player.heading+=TURN_SPD*dt*tf;
  if(rgt)player.heading-=TURN_SPD*dt*tf;
  if(lft||rgt)player.speed*=.997;
  player.pos.x+=Math.sin(player.heading)*player.speed*dt;
  player.pos.z+=Math.cos(player.heading)*player.speed*dt;
  const cl=closestIdx(player.pos),bnd=ROAD_W/2-1.2;
  if(cl.d>bnd){
    const tp=tPts[cl.i],dx=player.pos.x-tp.x,dz=player.pos.z-tp.z,dist=Math.max(.01,cl.d);
    const pb=(cl.d-bnd)*.6;player.pos.x-=(dx/dist)*pb;player.pos.z-=(dz/dist)*pb;player.speed*=.93;
    // Off-road dust
    dustTimer+=dt;if(dustTimer>.05){dustTimer=0;emitDust(player.pos,player.heading);}
  }else if(cl.d>ROAD_W/2-3){player.speed*=.985;}
  player.pos.y=tPts[cl.i].y;
  player.mesh.position.copy(player.pos);player.mesh.rotation.y=player.heading;
  const tiltTarget=((lft?1:0)-(rgt?1:0))*.15*tf;
  player.mesh.rotation.z+=(tiltTarget-player.mesh.rotation.z)*dt*6;
  const fl=player.mesh.userData.flame,fl2=player.mesh.userData.flame2;
  fl.visible=player.boostT>0;fl2.visible=player.boostT>0;
  if(fl.visible){
    fl.scale.set(.8+Math.random()*.5,.6+Math.random()*.8,.8+Math.random()*.5);
    fl2.scale.set(.6+Math.random()*.4,.5+Math.random()*.6,.6+Math.random()*.4);
    emitBoost(player.pos,player.heading);
  }
  if(player.boostT>0)player.boostT-=dt;
  // Hard braking smoke
  if(brk&&player.speed>20){if(Math.random()<.3)emitP(player.pos.x,player.pos.y+.3,player.pos.z,(Math.random()-.5)*2,.5+Math.random(),(Math.random()-.5)*2,.6,.6,.6,.4);}
  player.prevT=player.curT;player.curT=cl.t;
  if(player.curT>.08&&player.curT<.92)player.hasPassed=true;
  if(player.hasPassed&&player.prevT>.9&&player.curT<.1){
    player.lap++;showLapNote(player.lap+1);
    if(player.lap>=LAPS){player.finished=true;player.finTime=raceTime;finishTimer=2;}
  }
  if(player.hasPassed&&player.prevT<.1&&player.curT>.9)player.lap=Math.max(0,player.lap-1);
  const ww=document.getElementById('wrongWay');
  if(player.speed<-2)ww.style.opacity='1';else ww.style.opacity='0';
  if(keys.Space&&player.item){useItem(player,true);keys.Space=false;}
  checkBox(player,true);
}

/* ─── AI Update ─── */
function updateAI(a,dt,idx){
  if(a.finished){a.speed*=.97;a.mesh.position.copy(a.pos);return;}
  if(a.spinT>0){a.spinT-=dt;a.mesh.rotation.y+=dt*16;a.speed*=.94;a.mesh.position.copy(a.pos);return;}
  const spd=a.boostT>0?a.baseSpd*1.4:a.baseSpd;
  const la=((a.curT+.04)%1+1)%1,ct=tTan[Math.floor(a.curT*SAMPLES)%SAMPLES],at=tTan[Math.floor(la*SAMPLES)%SAMPLES];
  const curv=1-ct.dot(at);const cf=Math.max(.55,1-curv*6);
  a.speed=spd*cf;
  const dtT=(a.speed/tLen)*dt;a.prevT=a.curT;a.curT=(a.curT+dtT)%1;
  const d=trackAt(a.curT);a.wobble+=dt*.4;
  const wo=Math.sin(a.wobble+idx*2.1)*2.2;
  a.pos.set(d.p.x+d.r.x*(a.off+wo),d.p.y,d.p.z+d.r.z*(a.off+wo));
  a.heading=Math.atan2(d.tn.x,d.tn.z);
  a.mesh.position.copy(a.pos);a.mesh.rotation.y=a.heading;
  const fl=a.mesh.userData.flame,fl2=a.mesh.userData.flame2;
  fl.visible=a.boostT>0;fl2.visible=a.boostT>0;
  if(fl.visible){fl.scale.set(.8+Math.random()*.4,.6+Math.random()*.6,.8+Math.random()*.4);emitBoost(a.pos,a.heading);}
  if(a.boostT>0)a.boostT-=dt;
  if(a.curT>.08&&a.curT<.92)a.hasPassed=true;
  if(a.hasPassed&&a.prevT>.9&&a.curT<.1){a.lap++;if(a.lap>=LAPS){a.finished=true;a.finTime=raceTime;}}
  checkBox(a,false);
  if(a.item){if(!a.itemTimer)a.itemTimer=1.2+Math.random()*2;a.itemTimer-=dt;if(a.itemTimer<=0){useItem(a,false);a.itemTimer=null;}}
}

/* ─── Camera ─── */
const camLook=new THREE.Vector3();
function updateCam(dt){
  const off=new THREE.Vector3(0,5.5,-13).applyAxisAngle(new THREE.Vector3(0,1,0),player.heading);
  const ideal=player.pos.clone().add(off);
  camera.position.lerp(ideal,1-Math.pow(.04,dt));
  const lt=player.pos.clone().add(new THREE.Vector3(0,1.2,6).applyAxisAngle(new THREE.Vector3(0,1,0),player.heading));
  camLook.lerp(lt,1-Math.pow(.008,dt));
  camera.lookAt(camLook);
  const tFov=65+(Math.abs(player.speed)/MAX_SPD)*18;
  camera.fov+=(tFov-camera.fov)*dt*4;camera.updateProjectionMatrix();
}

/* ─── Speed Lines ─── */
const slCvs=document.getElementById('speedLines');
const slCtx=slCvs.getContext('2d');
slCvs.width=innerWidth;slCvs.height=innerHeight;
function drawSpeedLines(){
  slCtx.clearRect(0,0,slCvs.width,slCvs.height);
  const spd=Math.abs(player.speed);
  if(spd<40)return;
  const intensity=(spd-40)/(MAX_SPD*1.5-40);
  const cx=slCvs.width/2,cy=slCvs.height/2;
  const n=Math.floor(intensity*35);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const ir=150+Math.random()*120;const or=ir+40+Math.random()*180*intensity;
    slCtx.strokeStyle=`rgba(255,255,255,${.04+intensity*.12})`;
    slCtx.lineWidth=.5+Math.random()*2;
    slCtx.beginPath();slCtx.moveTo(cx+Math.cos(a)*ir,cy+Math.sin(a)*ir);
    slCtx.lineTo(cx+Math.cos(a)*or,cy+Math.sin(a)*or);slCtx.stroke();
  }
}

/* ─── HUD ─── */
function getPositions(){
  return allKarts.map((k,i)=>({i,sc:k.lap*tLen+k.curT*tLen,fin:k.finished,ft:k.finTime}))
    .sort((a,b)=>{if(a.fin&&b.fin)return a.ft-b.ft;if(a.fin)return-1;if(b.fin)return 1;return b.sc-a.sc;});
}
function updateHUD(){
  const pos=getPositions(),pp=pos.findIndex(p=>p.i===0)+1;
  document.getElementById('posDisp').textContent=pp+(ORD[pp-1]||'th');
  document.getElementById('lapDisp').textContent=Math.min(player.lap+1,LAPS);
  document.getElementById('spdDisp').textContent=Math.round(Math.abs(player.speed)*3.6);
}
function showLapNote(n){
  const el=document.getElementById('lapNotification');
  el.textContent=n>LAPS?'FINAL LAP':`Lap ${n} / ${LAPS}`;
  el.style.opacity='1';el.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(-50%) translateY(-20px)';},1800);
}
function updateMinimap(){
  const c=document.getElementById('minimap'),x=c.getContext('2d');
  x.clearRect(0,0,140,140);
  let mnX=1e9,mxX=-1e9,mnZ=1e9,mxZ=-1e9;
  for(let i=0;i<SAMPLES;i+=10){const p=tPts[i];mnX=Math.min(mnX,p.x);mxX=Math.max(mxX,p.x);mnZ=Math.min(mnZ,p.z);mxZ=Math.max(mxZ,p.z);}
  const pad=14,sx=(140-pad*2)/(mxX-mnX),sz=(140-pad*2)/(mxZ-mnZ),sc=Math.min(sx,sz);
  const ox=pad+(140-pad*2-(mxX-mnX)*sc)/2,oz=pad+(140-pad*2-(mxZ-mnZ)*sc)/2;
  const mp=(px,pz)=>[ox+(px-mnX)*sc,oz+(pz-mnZ)*sc];
  // Track shadow
  x.strokeStyle='rgba(0,0,0,.3)';x.lineWidth=5;x.beginPath();
  for(let i=0;i<=SAMPLES;i+=3){const j=i%SAMPLES,[mx,mz]=mp(tPts[j].x,tPts[j].z);i===0?x.moveTo(mx+1,mz+1):x.lineTo(mx+1,mz+1);}
  x.closePath();x.stroke();
  // Track line
  x.strokeStyle='rgba(255,255,255,.5)';x.lineWidth=3.5;x.beginPath();
  for(let i=0;i<=SAMPLES;i+=3){const j=i%SAMPLES,[mx,mz]=mp(tPts[j].x,tPts[j].z);i===0?x.moveTo(mx,mz):x.lineTo(mx,mz);}
  x.closePath();x.stroke();
  // Karts
  const cols=['#E53935','#1E88E5','#FDD835','#43A047'];
  allKarts.forEach((k,i)=>{const[mx,mz]=mp(k.pos.x,k.pos.z);
    x.fillStyle='rgba(0,0,0,.4)';x.beginPath();x.arc(mx+1,mz+1,4,0,6.28);x.fill();
    x.fillStyle=cols[i];x.beginPath();x.arc(mx,mz,3.5,0,6.28);x.fill();
    x.strokeStyle='rgba(255,255,255,.7)';x.lineWidth=.8;x.stroke();
  });
}

/* ─── Game Flow ─── */
function startCountdown(){
  state='countdown';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  const ov=document.getElementById('countdownOverlay'),tx=document.getElementById('countdown');
  ov.classList.remove('hidden');
  let n=3;tx.textContent=n;tx.style.color='#fff';
  tx.style.animation='none';void tx.offsetWidth;tx.style.animation='cpulse .45s ease-out';
  const iv=setInterval(()=>{
    n--;
    if(n>0){tx.textContent=n;tx.style.animation='none';void tx.offsetWidth;tx.style.animation='cpulse .45s ease-out';}
    else if(n===0){tx.textContent='GO!';tx.style.color='#FF6B00';tx.style.animation='none';void tx.offsetWidth;tx.style.animation='cpulse .45s ease-out';}
    else{ov.classList.add('hidden');state='racing';raceTime=0;clearInterval(iv);}
  },1000);
}
function showResults(){
  state='finished';document.getElementById('hud').classList.add('hidden');
  const pos=getPositions(),pp=pos.findIndex(p=>p.i===0)+1;
  document.getElementById('resPos').textContent=pp+(ORD[pp-1]||'th');
  const m=Math.floor(player.finTime/60),s=(player.finTime%60).toFixed(2);
  document.getElementById('resTime').textContent=`${m}:${s.padStart(5,'0')}`;
  document.getElementById('resultsScreen').classList.remove('hidden');
}
function resetGame(){
  projectiles.forEach(p=>scene.remove(p.mesh));projectiles.length=0;
  for(let i=0;i<MAX_P;i++){pData[i].active=false;pPositions[i*3+1]=-500;}
  pGeo.attributes.position.needsUpdate=true;
  itemBoxes.forEach(b=>{b.userData.active=true;b.visible=true;b.userData.timer=0;if(b.userData.glow)b.userData.glow.visible=true;});
  posKarts();raceTime=0;finishTimer=-1;
}

/* ─── Main Loop ─── */
let lastT=0,waterOff=0;
function loop(time){
  requestAnimationFrame(loop);
  const dt=Math.min((time-lastT)/1000,.05);lastT=time;
  waterOff+=dt*.3;
  // Always animate
  clouds.forEach(c=>{c.position.x+=dt*1.5;if(c.position.x>400)c.position.x=-400;});
  water.material.map.offset.set(waterOff,waterOff*.7);
  water.position.y=-.15+Math.sin(time*.001)*.08;
  // Item boxes float
  itemBoxes.forEach(bx=>{
    if(bx.userData.active){
      bx.rotation.y+=dt*2.5;bx.rotation.x+=dt*.8;
      bx.position.y=bx.userData.baseY+Math.sin(time*.003+bx.position.x)*.35;
      if(bx.userData.glow){bx.userData.glow.position.y=bx.position.y;bx.userData.glow.material.opacity=.15+Math.sin(time*.005)*.08;}
    }else{
      bx.userData.timer-=dt;
      if(bx.userData.timer<=0){bx.userData.active=true;bx.visible=true;if(bx.userData.glow)bx.userData.glow.visible=true;}
    }
  });
  if(state==='racing'){
    raceTime+=dt;
    updatePlayer(dt);
    ais.forEach((a,i)=>updateAI(a,dt,i));
    updateProj(dt);
    updateParticles(dt);
    updateHUD();updateMinimap();drawSpeedLines();
    if(finishTimer>0){finishTimer-=dt;if(finishTimer<=0)showResults();}
    if(!player.finished&&ais.every(a=>a.finished)&&finishTimer<0)finishTimer=5;
    updateCam(dt);
  }else if(state==='countdown'){
    updateCam(dt);
  }else{
    slCtx.clearRect(0,0,slCvs.width,slCvs.height);
  }
  renderer.render(scene,camera);
}

/* ─── Events ─── */
document.getElementById('startBtn').addEventListener('click',()=>{posKarts();startCountdown();});
document.getElementById('restartBtn').addEventListener('click',()=>{
  document.getElementById('resultsScreen').classList.add('hidden');resetGame();startCountdown();
});
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);slCvs.width=innerWidth;slCvs.height=innerHeight;
});
camLook.set(40,0,-70);
requestAnimationFrame(loop);
</script>
